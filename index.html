<!DOCTYPE html>
<html id="html">

<body>
    <script>
        let lang = navigator.language.split("-")[0];
        switch (lang) {
            case "ru":
                window.location.href = "/pages/ru.html"
                break;
            default:
                window.location.href = "/pages/en.html"
                break;
        }
    </script>
</body>

</html>
