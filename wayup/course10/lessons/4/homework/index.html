<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;family=Open+Sans&amp;family=Ubuntu:wght@400;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="src/main.css" />
    <title>Way Up</title>
  </head>
  <body>
    <header>
      <img class="logo" src="src/img/logo.png" alt="Way Up Logo" />
      <h1>
        С помощью верстки<br />я создам ту жизнь, о которой<br /><span
          >мечтаю!</span
        >
      </h1>
      <p>
        Мои стремления + настойчивость позволят мне <br />достичь чего угодно. Я
        не верю в это. Я знаю это <br />на 100%. Меня не остановить!
      </p>
      <button>Двигаться к мечте!</button>
    </header>
    <section>
      <div class="future">
        <h2>Что меня ждет впереди</h2>
        <div class="container">
          <div class="container">
            <img src="src/img/time-machine.png" alt="" />
            <h3>Свободное время</h3>
            
          </div>
          <div class="container">
            <img src="src/img/beach.png" alt="" />
            <h3>Яркие путешествия</h3>
          </div>
          <div class="container">
            <img src="src/img/launch.png" alt="" />
            <h3>Создание ценности</h3>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
